### common settings
quarkus.banner.enabled=false
# http
quarkus.http.port=8082
quarkus.http.test-port=8084
quarkus.http.auth.session.encryption-key=123456789012345678901234567890

# security
quarkus.http.auth.basic=true
quarkus.http.auth.form.enabled=true
quarkus.http.auth.form.http-only-cookie=true
quarkus.http.auth.form.landing-page=
quarkus.http.auth.form.login-page=
quarkus.http.auth.form.error-page=

# websocket
quarkus.websocket.dispatch-to-worker=true

# database migrations
quarkus.liquibase.change-log=migrations.xml

# tests
quarkus.test.integration-test-profile=test

### dev profile overrides
%dev.quarkus.http.port=8083
%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.jdbc.url=jdbc:h2:./target/commafeed
%dev.quarkus.datasource.username=sa
%dev.quarkus.datasource.password=sa
%dev.quarkus.log.category."com.commafeed".level=DEBUG
%dev.cf.app.allow-registrations=true
# %dev.quarkus.hibernate-orm.log.sql=true

### test profile overrides
%test.quarkus.datasource.db-kind=h2
%test.cf.app.create-demo-account=true
%test.cf.app.allow-registrations=true
%test.cf.app.smtp.host=localhost
%test.cf.app.smtp.port=3025
%test.cf.app.smtp.tls=false
%test.cf.app.smtp.user-name=user
%test.cf.app.smtp.password=pass
%test.cf.app.smtp.from-address=noreply@commafeed.com

### prod profile overrides
%prod.quarkus.datasource.db-kind=h2
%prod.quarkus.datasource.jdbc.url=jdbc:h2:/commafeed/data/db;DEFRAG_ALWAYS=TRUE
%prod.quarkus.datasource.username=sa
%prod.quarkus.datasource.password=sa

%prod-mysql.quarkus.datasource.db-kind=mysql
%prod-mysql.quarkus.datasource.jdbc.url=jdbc:mysql://localhost/commafeed?autoReconnect=true&failOverReadOnly=false&maxReconnects=20&rewriteBatchedStatements=true&timezone=UTC
%prod-mysql.quarkus.datasource.username=root
%prod-mysql.quarkus.datasource.password=commafeed

%prod-mariadb.quarkus.datasource.db-kind=mariadb
%prod-mariadb.quarkus.datasource.jdbc.url=jdbc:mariadb://localhost/commafeed?autoReconnect=true&failOverReadOnly=false&maxReconnects=20&rewriteBatchedStatements=true&timezone=UTC
%prod-mariadb.quarkus.datasource.username=root
%prod-mariadb.quarkus.datasource.password=commafeed

%prod-postgresql.quarkus.datasource.db-kind=postgresql
%prod-postgresql.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/commafeed
%prod-postgresql.quarkus.datasource.username=commafeed
%prod-postgresql.quarkus.datasource.password=commafeed
